services:
  - type: web
    name: inspec360
    runtime: node
    plan: free
    buildCommand: npm install --legacy-peer-deps && npm run build && cd backend && npm install --legacy-peer-deps
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: inspec360-db
          property: connectionString
